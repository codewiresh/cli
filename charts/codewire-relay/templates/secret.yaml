{{- if or (eq .Values.relay.authMode "token") .Values.relay.authToken -}}
{{- $secretName := include "codewire-relay.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingToken := "" -}}
{{- if $existing -}}
{{- $existingToken = (get $existing.data "auth-token" | default "") -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "codewire-relay.labels" . | nindent 4 }}
type: Opaque
data:
  auth-token: {{- if .Values.relay.authToken }} {{ .Values.relay.authToken | b64enc | quote }}{{- else if $existingToken }} {{ $existingToken | quote }}{{- else }} {{ randAlphaNum 32 | b64enc | quote }}{{- end }}
{{- end }}
