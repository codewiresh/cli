name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  REGISTRY: git.noel.sh
  DEMO_SITE_IMAGE_NAME: codewire/codewire-demo-site
  DEPLOY_CONTEXT: app
  DEMO_SITE_NAMESPACE: codewire-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - run: go test ./cmd/cw ./internal/... ./tests/... -timeout 120s -count=1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - run: go build -o cw ./cmd/cw

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - run: go vet ./...

  build-demo-site:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ gitea.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ gitea.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ gitea.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Infisical
        run: |
          RESPONSE=$(curl -s -X POST "${INFISICAL_API_URL}/v1/auth/oidc-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identityId\": \"${INFISICAL_IDENTITY_ID}\", \"jwt\": \"$(cat ${INFISICAL_SA_TOKEN_PATH})\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to authenticate"; echo "$RESPONSE"; exit 1
          fi
          echo "INFISICAL_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Login to Gitea Registry
        run: |
          REGISTRY_TOKEN=$(curl -s "${INFISICAL_API_URL}/v3/secrets/raw/GITEA_REGISTRY_TOKEN?workspaceSlug=shared&environment=prod&secretPath=/ci" \
            -H "Authorization: Bearer ${INFISICAL_TOKEN}" | jq -r '.secret.secretValue')
          echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u ci --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          driver: docker

      - name: Build and push demo site image
        if: gitea.event_name != 'pull_request'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: demo/site/
          file: demo/site/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DEMO_SITE_IMAGE_NAME }}:${{ steps.meta.outputs.tag }},${{ env.REGISTRY }}/${{ env.DEMO_SITE_IMAGE_NAME }}:latest

  deploy-demo-site:
    runs-on: ubuntu-latest
    needs: [build-demo-site, test]
    if: gitea.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure kubectl
        run: |
          TOKEN=$(cat ${K8S_DEPLOY_TOKEN_PATH})
          kubectl config set-cluster $DEPLOY_CONTEXT --server="${K8S_DEPLOY_SERVER}" --insecure-skip-tls-verify=true
          kubectl config set-credentials ci-deployer --token="$TOKEN"
          kubectl config set-context $DEPLOY_CONTEXT --cluster=$DEPLOY_CONTEXT --user=ci-deployer
          kubectl config use-context $DEPLOY_CONTEXT

      - name: Update manifests with image tag
        run: |
          sed -i "s|IMAGE_TAG|${{ needs.build-demo-site.outputs.image_tag }}|g" k8s/demo-site/*.yaml
          sed -i "s|REGISTRY_URL|$REGISTRY|g" k8s/demo-site/*.yaml
          sed -i "s|IMAGE_NAME|$DEMO_SITE_IMAGE_NAME|g" k8s/demo-site/*.yaml

      - name: Deploy demo site to cluster
        run: |
          kubectl --context=$DEPLOY_CONTEXT apply -f k8s/demo-site/ -n $DEMO_SITE_NAMESPACE
          kubectl --context=$DEPLOY_CONTEXT rollout status deployment/codewire-demo-site -n $DEMO_SITE_NAMESPACE --timeout=300s

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl --context=$DEPLOY_CONTEXT get pods -n $DEMO_SITE_NAMESPACE
          echo "=== Ingress ==="
          kubectl --context=$DEPLOY_CONTEXT get ingress -n $DEMO_SITE_NAMESPACE
